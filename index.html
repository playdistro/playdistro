<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayDistro Portal — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#050505;
    --surface:#0f0f0f;
    --border:#1e1e1e;
    --purple:#a855f7;
    --purple-dark:#7c3aed;
    --purple-glow:rgba(168,85,247,0.15);
    --text:#f0f0f0;
    --muted:#666;
    --error:#f87171;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(168,85,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(168,85,247,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
  .glow{position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(168,85,247,0.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:440px;position:relative;z-index:1}
  .card::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,rgba(168,85,247,0.3),transparent,rgba(168,85,247,0.1));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
  .logo{text-align:center;margin-bottom:32px}
  .logo-text{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
  .logo-sub{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
  h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px}
  .subtitle{color:var(--muted);font-size:14px;margin-bottom:32px}
  .field{margin-bottom:18px}
  label{display:block;font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  input,select{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
  input:focus,select:focus{border-color:var(--purple)}
  select option{background:#1a1a1a}
  .btn{width:100%;background:linear-gradient(135deg,var(--purple-dark),var(--purple));border:none;border-radius:8px;padding:14px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s;margin-top:8px}
  .btn:hover{opacity:0.9}
  .btn:active{transform:scale(0.98)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:12px;color:var(--error);font-size:13px;margin-top:12px;display:none}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>
<div class="card">
  <div class="logo">
    <div class="logo-text">PlayDistro</div>
    <div class="logo-sub">Team Portal</div>
  </div>
  <h1>Welcome back!</h1>
  <p class="subtitle">Sign in to your portal</p>
  <div class="field">
    <label>Portal</label>
    <select id="portalType">
      <option value="">— Select your portal —</option>
      <option value="admin">Admin</option>
      <option value="sms">SMS</option>
      <option value="it">IT</option>
    </select>
  </div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="off">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div class="error" id="errMsg"></div>
</div>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function doLogin() {
  const portal = document.getElementById('portalType').value;
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  err.style.display = 'none';

  if (!portal) return showErr('Please select a portal.');
  if (!username || !password) return showErr('Please enter username and password.');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';

  const { data: users, error } = await sb.from('users').select('*').eq('username', username).eq('password', password).eq('is_active', true);

  if (error || !users || users.length === 0) {
    btn.disabled = false; btn.innerHTML = 'Sign In';
    return showErr('Invalid username or password, or account is disabled.');
  }

  const user = users[0];
  sessionStorage.setItem('pd_user', JSON.stringify(user));
  sessionStorage.setItem('pd_portal', portal);

  // Update online status
  await sb.from('users').update({ is_online: true }).eq('id', user.id);

  if (user.must_change_password) {
    window.location.href = 'change-password.html';
  } else if (user.role === 'admin' || user.role === 'supervisor') {
    window.location.href = 'admin.html';
  } else {
    window.location.href = 'agent.html';
  }
}

function showErr(msg) {
  const e = document.getElementById('errMsg');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').innerHTML = 'Sign In';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
