<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — PlayDistro Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#050505;--surface:#0f0f0f;--border:#1e1e1e;--purple:#a855f7;--purple-dark:#7c3aed;--text:#f0f0f0;--muted:#666;--error:#f87171;--success:#4ade80}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(168,85,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(168,85,247,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:100%;max-width:440px;position:relative;z-index:1}
  .logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:24px}
  h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:28px}
  .field{margin-bottom:16px}
  label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  input{width:100%;background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
  input:focus{border-color:var(--purple)}
  .btn{width:100%;background:linear-gradient(135deg,var(--purple-dark),var(--purple));border:none;border-radius:8px;padding:14px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s}
  .btn:hover{opacity:0.9}
  .msg{border-radius:8px;padding:12px;font-size:13px;margin-top:12px;display:none}
  .msg.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--error)}
  .msg.success{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--success)}
  .rules{font-size:12px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="logo-text">PlayDistro Portal</div>
  <h1>🔐 Set New Password</h1>
  <p class="subtitle">This is your first login. You must set a new password to continue.</p>
  <div class="field">
    <label>New Password</label>
    <input type="password" id="newPass" placeholder="Enter new password">
    <div class="rules">Min 8 characters, include uppercase & number</div>
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirmPass" placeholder="Confirm new password">
  </div>
  <button class="btn" onclick="changePassword()">Set Password & Continue</button>
  <div class="msg error" id="errMsg"></div>
  <div class="msg success" id="okMsg"></div>
</div>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const user = JSON.parse(sessionStorage.getItem('pd_user') || 'null');
if (!user) window.location.href = 'index.html';

async function changePassword() {
  const np = document.getElementById('newPass').value;
  const cp = document.getElementById('confirmPass').value;
  if (np.length < 8) return showMsg('error','Password must be at least 8 characters.');
  if (!/[A-Z]/.test(np)) return showMsg('error','Password must contain at least one uppercase letter.');
  if (!/[0-9]/.test(np)) return showMsg('error','Password must contain at least one number.');
  if (np !== cp) return showMsg('error','Passwords do not match.');

  await sb.from('users').update({ password: np, must_change_password: false }).eq('id', user.id);
  user.password = np; user.must_change_password = false;
  sessionStorage.setItem('pd_user', JSON.stringify(user));

  // Send email notification
  const pht = getPHTTime();
  await sendEmail(
    `${user.username} changed their password`,
    `Agent: ${user.username}\nRole: ${user.role}\nAction: Password changed on first login\nTime (PHT): ${pht}`
  );

  showMsg('success','Password updated! Redirecting...');
  setTimeout(() => {
    if (user.role === 'admin' || user.role === 'supervisor') window.location.href = 'admin.html';
    else window.location.href = 'agent.html';
  }, 2000);
}

function showMsg(type, msg) {
  document.querySelectorAll('.msg').forEach(m => m.style.display='none');
  const el = document.getElementById(type === 'error' ? 'errMsg' : 'okMsg');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
